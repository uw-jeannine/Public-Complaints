{% extends 'base.html' %}

{% block title %}Delete Category{% endblock %}

{% block content %}
<div class="main-content-container overflow-hidden">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4 mt-1">
        <h3 class="mb-0 text-danger">Delete Complaint Category</h3>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb align-items-center mb-0 lh-1">
                <li class="breadcrumb-item">
                    <a href="{% url 'admin_dashboard' %}" class="d-flex align-items-center text-decoration-none">
                        <i class="ri-home-8-line fs-15 text-primary me-1"></i>
                        <span class="text-body fs-14" data-en="Dashboard" data-rw="Ikibaho">Dashboard</span>
                    </a>
                </li>
                <li class="breadcrumb-item">
                    <a href="{% url 'category_list' %}" data-en="Categories" data-rw="Ibyiciro">Categories</a>
                </li>
                <li class="breadcrumb-item active" data-en="Delete" data-rw="Siba">Delete</li>
            </ol>
        </nav>
    </div>

    <div class="card bg-white border border-white rounded-10 p-20 mb-4" style="max-width: 540px;">
        <div class="text-center mb-4">
            <div class="bg-danger bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
                style="width:70px; height:70px;">
                <i class="ri-delete-bin-line text-danger fs-1"></i>
            </div>
            <h5 class="fw-semibold text-secondary" data-en="Delete this category?" data-rw="Siba iki cyiciro?">Delete
                this category?</h5>
            <p class="text-body fs-16">
                <strong class="text-danger d-block">{{ category.name }}</strong>
            </p>
            <p class="text-muted fs-14" data-en="This action cannot be undone." data-rw="Ibi ntibishobora gusubirwamo.">
                This action cannot be undone.
            </p>
        </div>
        <form method="POST" class="d-flex gap-2 justify-content-center">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger fw-normal">
                <i class="ri-delete-bin-line me-1"></i>
                <span data-en="Yes, Delete" data-rw="Yego, Siba">Yes, Delete</span>
            </button>
            <a href="{% url 'category_list' %}" class="btn btn-outline-secondary fw-normal">
                <span data-en="Cancel" data-rw="Hagarika">Cancel</span>
            </a>
        </form>
    </div>
</div>
{% endblock %}
