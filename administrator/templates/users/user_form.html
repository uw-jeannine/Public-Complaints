{% extends 'base.html' %}
{% load static %}

{% block title %}{{ action }} User - {{ target_user.username }}{% endblock %}

{% block content %}
<div class="main-content-container overflow-hidden">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4 mt-1">
        <h3 class="mb-0" data-en="{{ action }} User" data-rw="Hindura Umukoresha">{{ action }} User</h3>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb align-items-center mb-0 lh-1">
                <li class="breadcrumb-item">
                    <a class="d-flex align-items-center text-decoration-none" href="{% url 'admin_dashboard' %}">
                        <i class="ri-home-8-line fs-15 text-primary me-1"></i>
                        <span class="text-body fs-14" data-en="Dashboard" data-rw="Ikibaho">Dashboard</span>
                    </a>
                </li>
                <li class="breadcrumb-item">
                    <a class="text-decoration-none text-body fs-14" href="{% url 'office_user_list' %}" data-en="Users"
                        data-rw="Abakoresha">Users</a>
                </li>
                <li class="breadcrumb-item active" data-en="{{ action }}" data-rw="Hindura">{{ action }}</li>
            </ol>
        </nav>
    </div>

    <div class="card bg-white border-0 rounded-10 mb-4">
        <div class="card-body p-4">
            <h4 class="mb-4 fs-18 fw-medium">User Information</h4>
            <form method="POST">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-medium text-secondary">Full Name</label>
                        <input type="text" name="full_name" class="form-control" value="{{ target_user.full_name }}"
                            required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-medium text-secondary">Username (Read-only)</label>
                        <input type="text" class="form-control bg-light" value="{{ target_user.username }}" readonly
                            disabled>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-medium text-secondary">Email Address</label>
                        <input type="email" name="email" class="form-control" value="{{ target_user.email }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-medium text-secondary">Phone Number</label>
                        <input type="text" name="phone" class="form-control" value="{{ target_user.phone_number }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-medium text-secondary">User Type (Read-only)</label>
                        <input type="text" class="form-control bg-light" value="{{ target_user.get_user_type_display }}"
                            readonly disabled>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-medium text-secondary">Assigned Office</label>
                        <select name="office" class="form-select">
                            <option value="">None / General</option>
                            {% for office in offices %}
                            <option value="{{ office.id }}" {% if target_user.office_id == office.id %}selected{% endif %}>
                                {{ office.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="mt-4 pt-2 border-top">
                    <button type="submit" class="btn btn-primary px-4 py-2 me-2">
                        <i class="ri-save-line me-1"></i> Save Changes
                    </button>
                    <a href="{% url 'office_user_list' %}" class="btn btn-outline-secondary px-4 py-2">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
