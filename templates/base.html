    {% include 'sidebar.html' %}

        <div class="main-content d-flex flex-column">

    <script src="{% static 'assets/js/jquery.min.js' %}"></script>
    <script src="{% static 'assets/js/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'assets/js/sidebar-menu.js' %}"></script>
    <script src="{% static 'assets/js/quill.min.js' %}"></script>
    <script src="{% static 'assets/js/data-table.js' %}"></script>
    <script src="{% static 'assets/js/prism.js' %}"></script>
    <script src="{% static 'assets/js/clipboard.min.js' %}"></script>
    <script src="{% static 'assets/js/simplebar.min.js' %}"></script>
    <script src="{% static 'assets/js/apexcharts.min.js' %}"></script>
    <script src="{% static 'assets/js/echarts.min.js' %}"></script>
    <script src="{% static 'assets/js/swiper-bundle.min.js' %}"></script>
    <script src="{% static 'assets/js/fullcalendar.main.js' %}"></script>

    <script src="{% static 'assets/js/world-merc.js' %}"></script>
    <script src="{% static 'assets/js/custom/apexcharts.js' %}"></script>
    <script src="{% static 'assets/js/custom/echarts.js' %}"></script>
    <script src="{% static 'assets/js/custom/maps.js' %}"></script>
    <script src="{% static 'assets/js/custom/custom.js' %}"></script>

    {% block scripts %}{% endblock %}
    <script>
        // Global EN/RW bilingual support — runs on every page
        (function () {
            function applyLanguage(lang) {
                document.querySelectorAll('[data-en]').forEach(function (el) {
                    el.textContent = el.getAttribute('data-' + lang) || el.getAttribute('data-en');
                });
                var enBtn = document.getElementById('lang-en');
                var rwBtn = document.getElementById('lang-rw');
                if (!enBtn || !rwBtn) return;
                if (lang === 'rw') {
                    enBtn.className = enBtn.className.replace('btn-primary', 'btn-outline-primary');
                    rwBtn.className = rwBtn.className.replace('btn-outline-secondary', 'btn-primary');
                } else {
                    enBtn.className = enBtn.className.replace('btn-outline-primary', 'btn-primary');
                    rwBtn.className = rwBtn.className.replace('btn-primary', 'btn-outline-secondary');
                }
            }

            window.setLanguage = function (lang) {
                localStorage.setItem('lang', lang);
                applyLanguage(lang);
            };

            // Apply on page load
            applyLanguage(localStorage.getItem('lang') || 'en');
        })();

        // SweetAlert2 Message Handler
        {% if messages %}
        {% for message in messages %}
        Swal.fire({
            icon: '{{ message.tags }}' === 'error' ? 'error' : ('{{ message.tags }}' === 'success' ? 'success' : 'info'),
            title: '{{ message.tags|title }}',
            text: '{{ message|escapejs }}',
            timer: 5000,
            timerProgressBar: true,
            showConfirmButton: true,
            confirmButtonColor: '#0047bb',
        });
        {% endfor %}
        {% endif %}
    </script>
</body>

</html>
